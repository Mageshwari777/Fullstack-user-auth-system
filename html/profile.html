<!DOCTYPE html>
<!--
  Profile page (Bootstrap + jQuery).
  Requires localStorage token. Uses AJAX to fetch/update profile in MongoDB.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand app-brand" href="#">User Auth System</a>
        <div class="d-flex">
          <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
          <div class="mb-3">
            <h3 id="welcome" class="mb-1">Welcome</h3>
            <div class="text-muted">View and update your profile details</div>
          </div>

          <div class="card p-4">
            <div id="msg" class="alert" style="display: none"></div>

            <div class="row g-3">
              <div class="col-12 col-md-4">
                <label for="age" class="form-label">Age</label>
                <input id="age" type="number" class="form-control" placeholder="e.g. 24" />
              </div>

              <div class="col-12 col-md-4">
                <label for="dob" class="form-label">Date of Birth</label>
                <input id="dob" type="date" class="form-control" />
              </div>

              <div class="col-12 col-md-4">
                <label for="contact" class="form-label">Contact Number</label>
                <input id="contact" type="text" class="form-control" placeholder="+1 555 123 4567" />
              </div>
            </div>

            <button id="saveBtn" class="btn btn-primary mt-4">Save Changes</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
