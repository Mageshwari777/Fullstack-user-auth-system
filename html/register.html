<!DOCTYPE html>
<!--
  Registration page (Bootstrap + jQuery).
  No form submission; uses jQuery AJAX only.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="text-center mb-4">
            <div class="app-brand h3 mb-1">User Auth System</div>
            <div class="text-muted">Create your account</div>
          </div>

          <div class="card p-4">
            <div id="msg" class="alert" style="display: none"></div>

            <div class="mb-3">
              <label class="form-label">Username</label>
              <input id="username" type="text" class="form-control" placeholder="john_doe" />
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input id="email" type="email" class="form-control" placeholder="john@example.com" />
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input id="password" type="password" class="form-control" placeholder="Min 6 characters" />
            </div>

            <button id="registerBtn" class="btn btn-primary w-100">Register</button>

            <div class="text-center mt-3">
              <span class="text-muted">Already have an account?</span>
              <a href="../html/login.html">Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/register.js"></script>
  </body>
</html>
